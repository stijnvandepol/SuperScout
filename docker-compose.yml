services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: superscout-web:latest
    container_name: superscout-web
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
