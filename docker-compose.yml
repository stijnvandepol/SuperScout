services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: superscout-web:latest
    container_name: superscout-web
    environment:
      - OFFERS_PATH=/data/offers.json
    volumes:
      - offers-data:/data
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingest
    image: superscout-ingestion:latest
    container_name: superscout-ingestion
    environment:
      - OFFERS_OUT=/data/offers.json
      # Runs once on start, then every morning at this UTC hour (5 ≈ 07:00 NL).
      - INGEST_HOUR=5
    volumes:
      - offers-data:/data
    restart: unless-stopped

volumes:
  offers-data:
